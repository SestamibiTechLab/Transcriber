services:
  - type: web
    name: podcast-transcriber
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg || true
    startCommand: gunicorn app:app --timeout 3600 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: WHISPER_MODEL
        value: base
    plan: free
