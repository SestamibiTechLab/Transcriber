<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Transcriber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .results {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
            display: none;
        }
        .results.show {
            display: block;
        }
        .results h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .full-text {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            color: #333;
            line-height: 1.6;
            font-size: 1em;
        }
        .metadata {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .meta-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
        }
        .meta-label {
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .meta-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
        }
        .segments {
            max-height: 400px;
            overflow-y: auto;
        }
        .segment {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .segment-time {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .segment-text {
            color: #333;
            line-height: 1.5;
        }
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Podcast Transcriber</h1>
        <p class="subtitle">Transcribe audio from YouTube with GPU-powered accuracy</p>
        <div id="status" class="status"></div>
        <form id="transcribeForm">
            <div class="form-group">
                <label for="url">YouTube URL</label>
                <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." required>
            </div>
            <div class="form-group">
                <label for="language">Language</label>
                <select id="language">
                    <option value="auto-detect">Auto-detect</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                </select>
            </div>
            <div class="loading" id="loading">
                <span class="spinner"></span>
                Transcribing... This may take a few minutes
            </div>
            <button type="submit" id="submitBtn">Transcribe</button>
        </form>
        <div id="results" class="results">
            <h2>✅ Transcription Complete</h2>
            <div class="metadata">
                <div class="meta-item">
                    <div class="meta-label">Detected Language</div>
                    <div class="meta-value" id="language-result">-</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Total Segments</div>
                    <div class="meta-value" id="segments-count">-</div>
                </div>
            </div>
            <div>
                <div style="color: #666; font-weight: 600; margin-bottom: 8px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px;">Full Transcription</div>
                <div class="full-text" id="fullText"></div>
            </div>
            <div style="margin-top: 25px;">
                <div style="color: #666; font-weight: 600; margin-bottom: 8px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px;">Timestamped Segments</div>
                <div class="segments" id="segmentsList"></div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://sestamibitechlab--podcast-transcriber-fastapi-app.modal.run';
        const form = document.getElementById('transcribeForm');
        const urlInput = document.getElementById('url');
        const languageSelect = document.getElementById('language');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    showStatus(`✅ API connected - ${data.model} model on ${data.device}`, 'success');
                } else {
                    showStatus('⚠️ API connection issue', 'error');
                }
            } catch (error) {
                showStatus('❌ Cannot connect to API', 'error');
                console.error('Health check failed:', error);
            }
        }

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            const language = languageSelect.value;

            if (!url) {
                showStatus('Please enter a URL', 'error');
                return;
            }

            submitBtn.disabled = true;
            loadingDiv.style.display = 'block';
            statusDiv.className = 'status';
            resultsDiv.classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/transcribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, language })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Transcription failed');
                }

                const data = await response.json();
                displayResults(data);
                showStatus('✅ Transcription successful!', 'success');

            } catch (error) {
                showStatus(`❌ ${error.message}`, 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });

        function displayResults(data) {
            document.getElementById('language-result').textContent = data.language || 'Unknown';
            document.getElementById('segments-count').textContent = data.segments.length;
            document.getElementById('fullText').textContent = data.text;

            const segmentsList = document.getElementById('segmentsList');
            segmentsList.innerHTML = data.segments.map(seg => `
                <div class="segment">
                    <div class="segment-time">${formatTime(seg.start)} - ${formatTime(seg.end)}</div>
                    <div class="segment-text">${seg.text}</div>
                </div>
            `).join('');

            resultsDiv.classList.add('show');
        }

        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        checkHealth();
    </script>
</body>
</html>
